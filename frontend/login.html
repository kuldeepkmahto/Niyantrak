<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Niyantrak - Fire Safety Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-media" aria-hidden="true">
            <video autoplay muted loop playsinline>
                <source src="https://videos.pexels.com/video-files/36088987/15305557_1920_1080_60fps.mp4" type="video/mp4">
            </video>
        </div>
        <div class="login-card">
            <h1><i class="fas fa-fire"></i> Niyantrak</h1>
            <p>Enterprise Fire Safety & Tracking</p>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <select id="role" name="role">
                    <option value="admin">Admin</option>
                    <option value="employee">Employee</option>
                    <option value="firemen">Firemen</option>
                    <option value="safetyofficer">safetyofficer</option>
                </select>
                <button type="submit">Login</button>
            </form>
            <div id="message"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
